<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <link rel="stylesheet" href="/styles/styles.css" />

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header></header>
    <main>
      <section class="container_calculator">
        <div class="display">
          <div id="result" class="result"></div>
          <div class="display_options">
            <button onclick="backspace()">
              <img
                src="img/backspace.png"
                alt="Icone Backspace"
                class="backspace"
              />
            </button>
          </div>
        </div>

        <div class="calculator">
          <button class="calculator_options" onclick="c()">C</button>
          <button class="calculator_options" onclick="parentheses()">( )</button>
          <button class="calculator_options">%</button>
          <button class="calculator_operations">/</button>

          <button onclick="display(7)">7</button>
          <button onclick="display(8)">8</button>
          <button onclick="display(9)">9</button>
          <button class="calculator_operations">x</button>

          <button onclick="display(4)">4</button>
          <button onclick="display(5)">5</button>
          <button onclick="display(6)">6</button>
          <button class="calculator_operations">-</button>

          <button onclick="display(1)">1</button>
          <button onclick="display(2)">2</button>
          <button onclick="display(3)">3</button>
          <button id="plus" onclick="sum()" class="calculator_operations">+</button>

          <button onclick="invertValue()">+/-</button>
          <button onclick="display(0)">0</button>
          <button onclick="point()">.</button>
          <button class="equals" onclick="equals()">=</button>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; Marcus Fonseca - 2026</p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
