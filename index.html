<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <link rel="stylesheet" href="/styles/styles.css" />
  </head>
  <body>
    <header></header>
    <main>
      <section class="container_calculator">
        <div class="calculator">
          <div id="result" class="result"></div>

          <div class="options">
            <button onclick="backspace()"> &lt;X </button>
          </div>

          <button>C</button>
          <button>( )</button>
          <button>%</button>
          <button>/</button>

          <button id="button1" onclick="display(7)">7</button>
          <button id="button1" onclick="display(8)">8</button>
          <button id="button1" onclick="display(9)">9</button>
          <button>x</button>

          <button id="button1" onclick="display(4)">4</button>
          <button id="button1" onclick="display(5)">5</button>
          <button id="button1" onclick="display(6)">6</button>
          <button>-</button>

          <button id="button1" onclick="display(1)">1</button>
          <button id="button1" onclick="display(2)">2</button>
          <button id="button1" onclick="display(3)">3</button>
          <button id="plus" onclick="sum()">+</button>

          <button>+/-</button>
          <button id="button1" onclick="display(0)">0</button>
          <button>,</button>
          <button>=</button>
        </div>
      </section>
    </main>

    <footer></footer>

    <script src="js/script.js"></script>
  </body>
</html>
